services:
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j-restaurantes
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ProyectoNeo4j2026}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./datos:/import:ro

volumes:
  neo4j_data:
  neo4j_logs:
